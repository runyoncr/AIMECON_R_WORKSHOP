project:
  type: book
  output-dir: _book

book:
  title: "Integrating Generative AI into R Workflows: From APIs to Shiny Apps"
  author: "Christopher Runyon"
  date: last-modified

  page-footer:
    left: |
      Copyright © `r format(Sys.Date(), "%Y")` by Christopher Runyon.<br> 
      Licensed under [CC BY-NC-ND 4.0](https://creativecommons.org/licenses/by-nc-nd/4.0/)
    right: |
      This book was built with <a href="https://quarto.org/">Quarto</a>.
  
  cover-image: SimpleBookCover_Image.png
  favicon: therefore.png
  
  chapters:
    - index.qmd
    
    - part: "Setup"
      chapters: 
        - 01-R-setup.qmd
        - 02-R-packages.qmd
        - 03-test-connect.qmd
        - 04-api-implementation.qmd
        - 05-api-keys.qmd
         
    - part: "GenAI Models Overview"
      chapters: 
        - 06-gen-ai-fundamentals.qmd
        - 07-gen-ai-basics.qmd
        - 08-gen-ai-parameters.qmd
        # Activity: Parameter Testing App

    - part: "LLM Workflows with R"
      chapters: 
        - num-sample-workflow.qmd
        - num-practical-tools.qmd
        - 10-integration.qmd
        - 11-conversations-via-api.qmd
        - num-activity-conversations-via-api.qmd
        # Activity: `ellmer`
        - 13-single-interactions-via-api.qmd
        - 17-mitigating-variability.qmd
        - num-activity-iterative-prompt-development.qmd
        # Activity: Prompt development & refinement
        - 18-batch-processing.qmd
        - num-activity-batch-processing.qmd
        # Activity: Batch processing
        - 21-chained-workflows.qmd
        - num-activity-prompt-chaining.qmd
        # Activity: Simple chained workflows
        - 23-calling-other-llms.qmd

    - part: "Vibe Coding with Shiny"
      chapters: 
        - 25-shiny.qmd
        - 26-vibe-coding.qmd
        - 27-shiny-integration.qmd
        - num-make-llm-shiny-app.qmd
        # Activity: Make Shiny App with LLM Call
        - 29-saving-shiny-data.qmd
        
    - part: "Resources"
      chapters: 
        - 30-reference-materials.qmd
        - 31-acknowledgements.qmd
        - 32-references.qmd
        
    - part: "Retired Pages"
      chapters: 
        - ret-intro.qmd
        - activity-parameter-testing.qmd
        - 14-prompt-engineering.qmd
        - 15-prompt-formulas.qmd
        - activity-prompt-engineering.qmd
        - activity-chained-workflows.qmd
        - activity-content-development-revision.qmd
        - 19-rubric-scoring.qmd
        - activity-scoring-with-rubrics.qmd
        - activity-chained-workflows.qmd
        - activity-shiny-app-development.qmd
        - 24-rag-models.qmd

  
  sidebar:
    collapse-level: 1
        
bibliography: references.bib
csl: american-medical-association.csl

execute:
  echo: true
  eval: true
  engine: knitr 
  
format:
  html:
    theme: spacelab
    toc: true
    toc-depth: 4
    number-depth: 4
    css: style.css
    code-fold: show
    code-tools: true
    code-copy: true
    code-link: true
    link-citations: true
    citation-hover: true
    link-external-newwindow: true
    
website:
  site-url: https://runyoncr.github.io/AIMECON_R_WORKSHOP
  repo-url: https://github.com/runyoncr/AIMECON_R_WORKSHOP